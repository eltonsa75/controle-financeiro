<div class="main-container">
  <div class="login-box">
    
    <div class="purple-panel">
      <div class="welcome-text">
        <h1>Recuperar Senha</h1>
        <p>Não se preocupe, nós ajudamos você a recuperar o acesso à sua conta.</p>
      </div>
    </div>

    <div class="form-panel">
      <h2>Esqueceu sua senha?</h2>
      <p class="description">Insira seu e-mail abaixo para receber as instruções.</p>
      
      <form [formGroup]="forgotForm" (ngSubmit)="enviarEmail()" class="custom-form">
        
        <div class="field-wrapper">
          <div class="input-group" [class.error-border]="forgotForm.get('email')?.touched && forgotForm.get('email')?.invalid">
            <span class="input-group-text"><i class="bi bi-envelope-fill"></i></span>
            <input type="email" formControlName="email" placeholder="E-mail" class="form-control"
                   [class.is-invalid]="forgotForm.get('email')?.touched && forgotForm.get('email')?.invalid">
          </div>
          <div class="error-msg" *ngIf="forgotForm.get('email')?.touched && forgotForm.get('email')?.invalid">
            Por favor, informe um e-mail válido.
          </div>
        </div>

        <!-- Mensagem de Feedback (Aparece apenas quando 'mensagem' for preenchida no TS) -->
        <div class="alert-message" [class.success]="isSucesso" [class.error]="!isSucesso" *ngIf="mensagem">
          {{ mensagem }}
        </div>

        <!-- Botão com controle de carregamento -->
        <button type="submit" class="btn-primary" [disabled]="forgotForm.invalid || enviando">
          <span *ngIf="!enviando">Enviar link de recuperação</span>
          <span *ngIf="enviando">Enviando e-mail...</span>
        </button>

        <div class="text-center mt-3">
          <a (click)="voltarLogin()" style="cursor: pointer; color: #6c5ce7;">Voltar para o Login</a>
        </div>
      </form>
    </div>
  </div>
</div>
