<div class="auth-wrapper">
  <div class="auth-card">
    
    <div class="auth-sidebar-panel">
      <h1>Nova Senha</h1>
      <p>Quase lá! Crie uma nova senha forte para restabelecer o acesso com segurança à sua conta.</p>
    </div>

    <div class="auth-content-panel">
      <h2>Definir Nova Senha</h2>
      <p class="subtitle">Insira e confirme sua nova senha abaixo.</p>

      <form [formGroup]="passForm" (ngSubmit)="definirNovaSenha()" class="form-container">
        
        <div class="input-field-group">
          <div class="input-wrapper">
            <i class="pi pi-lock input-icon"></i>
            <input 
              type="password" 
              formControlName="password" 
              placeholder="Nova senha"
              [class.input-error]="passForm.get('password')?.invalid && passForm.get('password')?.touched"
            >
          </div>
          <span class="error-text" *ngIf="passForm.get('password')?.hasError('minlength') && passForm.get('password')?.touched">
            A senha precisa de pelo menos 6 caracteres.
          </span>
        </div>

        <div class="input-field-group">
          <div class="input-wrapper">
            <i class="pi pi-lock input-icon"></i>
            <input 
              type="password" 
              formControlName="confirmPassword" 
              placeholder="Confirme a nova senha"
              [class.input-error]="passForm.hasError('mismatch') && passForm.get('confirmPassword')?.touched"
            >
          </div>
          <span class="error-text" *ngIf="passForm.hasError('mismatch') && passForm.get('confirmPassword')?.touched">
            As senhas digitadas não coincidem.
          </span>
        </div>

        <div class="status-alert" [class.success]="isSucesso" [class.error]="!isSucesso" *ngIf="mensagem">
          {{ mensagem }}
        </div>

        <button type="submit" class="btn-submit" [disabled]="passForm.invalid || enviando">
          <span *ngIf="!enviando">Salvar Nova Senha</span>
          <span *ngIf="enviando">Processando...</span>
        </button>

        <a routerLink="/login" class="back-link">Voltar para o Login</a>

      </form>
    </div>

  </div>
</div>
